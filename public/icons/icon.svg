<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Soft light sky gradient -->
    <linearGradient id="bg" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#5bb8f5"/>
      <stop offset="100%" stop-color="#daf0fc"/>
    </linearGradient>
    <!-- White-to-blue-gray gradient for paper wing -->
    <linearGradient id="wingLeft" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <!-- Muted shade gradient for underside -->
    <linearGradient id="wingFold" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#b8e4f9"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <!-- Soft drop shadow for paper plane -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0284c7" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Rounded squircle background representing the app icon -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Paper Plane Group with Shadow -->
  <g filter="url(#shadow)">
    <!-- Right side (shaded fold) -->
    <path fill="#bae6fd" d="M256 320 L390 150 L270 360 Z"/>
    <!-- Left side (bright face) -->
    <path fill="url(#wingLeft)" d="M120 280 L390 150 L256 320 Z"/>
    <!-- Bottom keel fold -->
    <path fill="url(#wingFold)" d="M256 320 L270 360 L230 340 Z"/>
  </g>
</svg>
