<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="AtlasNest is a visual bookmarking and note-taking studio for links, voice notes, checklists, and quick ideas.">
  <meta name="theme-color" content="#fbbc04">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AtlasNest">
  <title>HyperKeep — Upgraded Keep Clone</title>
  
  <!-- Premium Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-light light-theme">
  <!-- Top Header Navigation -->
  <header class="app-header">
    <div class="header-left">
      <button class="icon-btn menu-btn" aria-label="Main menu">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div class="logo-container">
        <svg class="keep-logo" viewBox="0 0 24 24" style="color: #fbbc04; filter: drop-shadow(0 0 6px rgba(251, 188, 4, 0.85)); animation: bellWobble 2s infinite ease-in-out;">
          <!-- Bulb Outline -->
          <path fill="currentColor" d="M12 2C7.86 2 4.5 5.36 4.5 9.5c0 2.82 1.55 5.27 3.84 6.55L9 20h6l.66-3.95C17.95 14.77 19.5 12.32 19.5 9.5 19.5 5.36 16.14 2 12 2zm2.15 13.75l-.29 1.75H10.1l-.29-1.75c-1.8-1.07-3-3.03-3-5.25 0-3.31 2.69-6 6-6s6 2.69 6 6c0 2.22-1.2 4.18-3 5.25z"/>
          <!-- Base thread -->
          <path fill="currentColor" d="M9 21h6v1H9z"/>
          <!-- Energized Core filament -->
          <path fill="currentColor" d="M11 9.5h2v3h-2zm0-3h2v2h-2z"/>
          <!-- Glow rays -->
          <path fill="currentColor" d="M12 0v1.5M12 17.5V19M4.2 4.2l1.1 1.1M18.7 12.7l1.1-1.1M2.5 9.5H1M23 9.5h-1.5M5.3 13.7l-1.1 1.1M19.8 4.2l-1.1 1.1"/>
        </svg>
        <span class="logo-title">HyperKeep</span>
      </div>
    </div>
    
    <div class="header-center">
      <div class="search-bar">
        <button class="icon-btn search-icon-btn" aria-label="Search">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
        <input type="text" id="search-input" placeholder="Search notes..." autocomplete="off">
        <button class="icon-btn clear-search-btn" id="search-clear" aria-label="Clear search" style="display: none;">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>
    
    <div class="header-right">
      <button class="icon-btn" id="view-toggle" aria-label="Toggle grid/list view">
        <svg id="grid-icon" viewBox="0 0 24 24" style="display: none;"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"/></svg>
        <svg id="list-icon" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zm0-8h14V7H7v2z"/></svg>
      </button>
      
      <button class="icon-btn theme-toggle-btn" id="theme-btn" aria-label="Switch to dark mode" title="Switch to dark mode">
        <svg viewBox="0 0 24 24"><path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-16h1v3h-1V2zm0 17h1v3h-1v-3zM2 11h3v1H2v-1zm17 0h3v1h-3v-1zM4.93 4.22l.71-.71 2.12 2.12-.71.71-2.12-2.12zm11.31 11.31l.71-.71 2.12 2.12-.71.71-2.12-2.12zM4.93 19.07l2.12-2.12.71.71-2.12 2.12-.71-.71zm11.31-11.31l2.12-2.12.71.71-2.12 2.12-.71-.71z"/></svg>
      </button>
      <div class="user-avatar">A</div>
    </div>
  </header>

  <!-- Sidebar (Dynamic Tag Filter List) -->
  <aside class="app-sidebar">
    <div class="sidebar-item active" id="sidebar-all-notes" title="All Notes" aria-label="All Notes">
      <svg class="sidebar-icon" viewBox="0 0 24 24"><path d="M5 4h11a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm2 4v2h7V8H7zm0 4v2h7v-2H7zm10-7.5L20.5 8 17 11.5V9h-2V7h2V4.5z"/></svg>
      <span class="sidebar-label">All Notes</span>
    </div>
  </aside>

  <!-- Main View Area -->
  <main class="main-content-area">
    <!-- Note Creator Container -->
    <div class="creator-wrapper">
      <div class="note-creator" id="note-creator">
        <!-- Pin Button (Visible only when expanded) -->
        <button class="icon-btn pin-btn creator-pin" id="creator-pin" aria-label="Pin note" style="display: none;">
          <svg viewBox="0 0 24 24">
            <path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2zM9.8 4h4.4v8H9.8V4z" />
          </svg>
        </button>

        <!-- Image banner slot in creator (Visible when image uploaded or sketched) -->
        <div class="creator-image-banner" id="creator-image-banner" style="display: none;">
          <img id="creator-img-preview" src="" alt="Creator banner">
          <button class="icon-btn remove-image-btn" id="creator-remove-img" aria-label="Remove image">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>

        <!-- Collapsed Note Input (Default state) -->
        <div class="creator-collapsed" id="creator-collapsed">
          <span class="collapsed-placeholder">Take a note...</span>
          <div class="collapsed-actions">
            <!-- Create Checklist Button -->
            <button class="icon-btn" id="creator-list-toggle" aria-label="New checklist">
              <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </button>
            <!-- Create Drawing Button -->
            <button class="icon-btn" id="creator-draw-toggle" aria-label="New drawing">
              <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </button>
          </div>
        </div>

        <!-- Expanded Note Input -->
        <div class="creator-expanded" id="creator-expanded" style="display: none;">
          <input type="text" id="creator-title" placeholder="Title" autocomplete="off">
          <textarea id="creator-text" placeholder="Take a note..." rows="1"></textarea>
          <div class="checklist-editor" id="creator-checklist-editor" style="display: none;"></div>
          
          <!-- Creator active reminder chips -->
          <div class="creator-chips-container" id="creator-chips-container" style="display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;"></div>
          
          <div class="creator-footer">
            <div class="creator-toolbar">
              <!-- Color Palette Wrapper -->
              <div class="color-palette-trigger-wrapper">
                <button class="icon-btn creator-palette-trigger" aria-label="Change color">
                  <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0 0 18c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01l-.23-.25a.3.3 0 0 1-.03-.17c0-.09.06-.15.15-.15H15a6 6 0 0 0 6-6c0-4.97-4.03-9-9-9zm-5.5 9a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3-3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm4.5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3 3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>
                </button>
                <div class="color-picker-bubble" id="creator-color-picker">
                  <!-- Generated Dynamically -->
                </div>
              </div>

              <!-- Reminder Wrapper -->
              <div class="reminder-trigger-wrapper">
                <button class="icon-btn creator-reminder-trigger" id="creator-reminder-btn" aria-label="Remind me">
                  <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                </button>
                <div class="reminder-picker-bubble" id="creator-reminder-picker">
                  <!-- Generated Dynamically -->
                </div>
              </div>
              
              <!-- Drawing Button inside expanded creator -->
              <button class="icon-btn" id="creator-palette-draw" aria-label="Drawing">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
              </button>

              <!-- Image Uploader Button in expanded creator -->
              <button class="icon-btn" id="creator-image-btn" aria-label="Add image">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
              </button>
              <input type="file" id="creator-image-input" accept="image/*" style="display: none;">

              <!-- Checklist Convert Button -->
              <button class="icon-btn" id="creator-list-btn" aria-label="Toggle checklist">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
              </button>

              <!-- Voice Note Button -->
              <button class="icon-btn" id="creator-voice-btn" aria-label="Add voice note" title="Record Voice">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
              </button>

              <!-- Recipe Importer Button -->
              <button class="icon-btn" id="creator-recipe-btn" aria-label="Import recipe" title="Import Recipe">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-8.03c2.09-.13 3.75-1.85 3.75-3.97V22h-2v7zm5-3v8h2.5v8h2V2c-2.48 0-4.5 2.02-4.5 4z"/></svg>
              </button>
            </div>
            <div class="creator-actions">
              <button class="text-btn save-btn" id="creator-save">Save</button>
              <button class="text-btn" id="creator-close">Close</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Notes Lists (Masonry / Responsive Grid) -->
    <div class="notes-feed">
      
      <!-- Pinned Notes Container -->
      <div class="notes-section" id="pinned-section" style="display: none;">
        <h3 class="section-title">PINNED</h3>
        <div class="notes-grid" id="pinned-grid">
          <!-- Note cards injected dynamically -->
        </div>
      </div>

      <!-- Others Notes Container -->
      <div class="notes-section" id="others-section" style="display: none;">
        <h3 class="section-title" id="others-section-title">NOTES</h3>
        <div class="notes-grid" id="others-grid">
          <!-- Note cards injected dynamically -->
        </div>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state">
        <svg class="empty-icon" viewBox="0 0 24 24">
          <path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/>
        </svg>
        <span class="empty-text">Notes you add appear here</span>
      </div>

    </div>
  </main>

  <!-- Note Editor Overlay Modal -->
  <div class="edit-modal-overlay" id="edit-modal">
    <div class="edit-modal-card" id="edit-modal-card">
      <button class="icon-btn pin-btn" id="modal-pin" aria-label="Pin note">
        <svg viewBox="0 0 24 24">
          <path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2zM9.8 4h4.4v8H9.8V4z" />
        </svg>
      </button>

      <!-- Image Banner slot inside Edit Modal -->
      <div class="creator-image-banner modal-image-banner" id="modal-image-banner" style="display: none;">
        <img id="modal-img-preview" src="" alt="Modal banner">
        <button class="icon-btn remove-image-btn" id="modal-remove-img" aria-label="Remove image">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>

      <input type="text" id="modal-title" placeholder="Title" autocomplete="off">
      <textarea id="modal-text" placeholder="Note" rows="4"></textarea>
      <div class="checklist-editor" id="modal-checklist-editor" style="display: none;"></div>

      <!-- Tags listing area in modal -->
      <div class="modal-tags-container" id="modal-tags-container"></div>

      <div class="modal-footer">
        <div class="modal-toolbar">
          <div class="color-palette-trigger-wrapper">
            <button class="icon-btn" id="modal-palette-btn" aria-label="Change note color">
              <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0 0 18c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01l-.23-.25a.3.3 0 0 1-.03-.17c0-.09.06-.15.15-.15H15a6 6 0 0 0 6-6c0-4.97-4.03-9-9-9zm-5.5 9a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3-3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm4.5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3 3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>
            </button>
            <div class="color-picker-bubble" id="modal-color-picker">
              <!-- Generated Dynamically -->
            </div>
          </div>

          <!-- Modal Reminder Wrapper -->
          <div class="reminder-trigger-wrapper">
            <button class="icon-btn" id="modal-reminder-btn" aria-label="Remind me">
              <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            </button>
            <div class="reminder-picker-bubble" id="modal-reminder-picker">
              <!-- Generated Dynamically -->
            </div>
          </div>
          
          <!-- Drawing button in modal -->
          <button class="icon-btn" id="modal-draw-btn" aria-label="Draw sketch">
            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          </button>

          <!-- Upload Image in modal -->
          <button class="icon-btn" id="modal-image-btn" aria-label="Add image">
            <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
          </button>
          <input type="file" id="modal-image-input" accept="image/*" style="display: none;">

          <!-- Toggle list in modal -->
          <button class="icon-btn" id="modal-list-btn" aria-label="Toggle checklist">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          </button>

          <!-- Voice Note Button -->
          <button class="icon-btn" id="modal-voice-btn" aria-label="Add voice note" title="Record Voice">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
          </button>

          <!-- Delete note -->
          <button class="icon-btn" id="modal-delete" aria-label="Delete note">
            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
        </div>
        <button class="text-btn" id="modal-close">Close</button>
      </div>
    </div>
  </div>

  <!-- Drawing Canvas Modal Overlay -->
  <div class="edit-modal-overlay" id="sketch-modal">
    <div class="sketch-container" id="sketch-container">
      <div class="sketch-header">
        <h3>Sketch Canvas</h3>
        <div class="sketch-actions">
          <button class="text-btn" id="sketch-clear">Clear</button>
          <button class="text-btn" id="sketch-close">Cancel</button>
          <button class="text-btn save-btn" id="sketch-save">Save Sketch</button>
        </div>
      </div>
      
      <div class="canvas-wrapper">
        <canvas id="sketch-canvas"></canvas>
      </div>
      
      <div class="sketch-footer">
        <div class="sketch-colors" id="sketch-colors">
          <button class="color-option sketch-color active" data-color="#202124" style="background-color: #202124;"></button>
          <button class="color-option sketch-color" data-color="#ea4335" style="background-color: #ea4335;"></button>
          <button class="color-option sketch-color" data-color="#fbbc05" style="background-color: #fbbc05;"></button>
          <button class="color-option sketch-color" data-color="#34a853" style="background-color: #34a853;"></button>
          <button class="color-option sketch-color" data-color="#4285f4" style="background-color: #4285f4;"></button>
          <button class="color-option sketch-color" data-color="#a142f4" style="background-color: #a142f4;"></button>
        </div>
        <div class="sketch-brush-tools">
          <button class="icon-btn" id="sketch-eraser" aria-label="Eraser tool">
            <svg viewBox="0 0 24 24"><path d="M16.24 7.56l4.24 4.24c.78.78.78 2.05 0 2.83L14.7 20.4c-.39.39-.9.59-1.41.59H7.83c-.51 0-1.02-.2-1.41-.59l-4.24-4.24c-.78-.78-.78-2.05 0-2.83l5.77-5.77 8.29 8.29zm-5.46 9.38L8.62 14.8l-3.3 3.3 2.16 2.16h3.3zm5.46-9.38l-1.41-1.41-5.77 5.77 1.41 1.41 5.77-5.77z"/></svg>
          </button>
          <span class="brush-size-label">Size:</span>
          <input type="range" id="sketch-brush-size" min="2" max="25" value="6" class="brush-slider" aria-label="Brush size">
        </div>
      </div>
    </div>
  </div>

  <!-- Recipe Importer Modal Overlay -->
  <div class="edit-modal-overlay" id="recipe-modal">
    <div class="edit-modal-card recipe-modal-card">
      <div class="recipe-modal-header">
        <h3>🍽️ Import Culinary Recipe</h3>
        <p class="recipe-modal-desc">Enter a recipe URL (try entering "salmon" or "taco" for our instant mock scraping engine) or enter ingredients and instructions manually.</p>
      </div>
      
      <div class="recipe-modal-body">
        <div class="input-group">
          <label for="recipe-url-input" class="recipe-field-label">Recipe URL / Quick Search</label>
          <input type="text" id="recipe-url-input" class="recipe-field-input" placeholder="e.g., https://allrecipes.com/recipe/salmon (or type 'salmon' or 'taco')">
        </div>
        
        <div class="form-divider"><span>OR ENTER MANUALLY</span></div>

        <div class="input-group">
          <label for="recipe-title-input" class="recipe-field-label">Recipe Title</label>
          <input type="text" id="recipe-title-input" class="recipe-field-input" placeholder="e.g., Creamy Garlic Tuscan Salmon">
        </div>
        
        <div class="input-group">
          <label for="recipe-ingredients-input" class="recipe-field-label">Ingredients (one per line)</label>
          <textarea id="recipe-ingredients-input" class="recipe-field-input textarea-field" rows="3" placeholder="e.g.&#10;4 salmon fillets&#10;1 cup heavy cream&#10;1 cup spinach"></textarea>
        </div>
        
        <div class="input-group">
          <label for="recipe-instructions-input" class="recipe-field-label">Instructions / Steps</label>
          <textarea id="recipe-instructions-input" class="recipe-field-input textarea-field" rows="4" placeholder="e.g.&#10;1. Season salmon with salt and pepper.&#10;2. Sear salmon in skillet for 5 mins each side.&#10;3. Add garlic and pour heavy cream."></textarea>
        </div>
      </div>
      
      <div class="modal-footer recipe-modal-footer">
        <button class="text-btn" id="recipe-modal-cancel">Cancel</button>
        <button class="text-btn save-btn" id="recipe-modal-import">Import Recipe</button>
      </div>
    </div>
  </div>

  <!-- Toast notification container -->
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
